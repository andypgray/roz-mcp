name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore tests/Zphil.Roz.Tests/Zphil.Roz.Tests.csproj

      - name: Build
        run: dotnet build tests/Zphil.Roz.Tests/Zphil.Roz.Tests.csproj --no-restore

      - name: Test
        run: dotnet test tests/Zphil.Roz.Tests/Zphil.Roz.Tests.csproj --no-build --logger "console;verbosity=normal" --collect:"XPlat Code Coverage" --settings tests/Zphil.Roz.Tests/ci.runsettings

  # Packs on Linux and asserts the MCP manifest lands at exactly `.mcp/server.json` — the
  # path nuget.org scans to generate the VS Code MCP config. A backslash PackagePath
  # mis-packs only on non-Windows (Zphil.ReSharperCli 1.0.0 shipped `.mcp//server.json`),
  # so this Linux job is the leg that catches it before a release tag does.
  pack-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Pack
        run: dotnet pack src/Zphil.Roz/Zphil.Roz.csproj -c Release -o artifacts

      - name: Verify server.json is packed at .mcp/server.json
        run: |
          entries="$(unzip -Z1 artifacts/*.nupkg)"
          grep -Fxq '.mcp/server.json' <<<"$entries" || {
            echo "::error::MCP manifest missing or mis-pathed in the packed nupkg (need .mcp/server.json)"
            printf '%s\n' "$entries" | grep -i 'server\.json' || true
            exit 1
          }
